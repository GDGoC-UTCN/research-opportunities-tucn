version: '3.8'
services:
  frontend:
    build:
      context: ./tucn-research-opportunities
      dockerfile: Dockerfile
    image: tucn-frontend:latest
    ports:
      - '8080:80'
    depends_on:
      - api
    networks:
      - tucn-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: tucn-api:latest
    environment:
      - DB_PATH=/data/data.sqlite
    volumes:
      - tucn_api_data:/data
    networks:
      - tucn-net
  migrations:
    image: tucn-api:latest
    depends_on:
      - api
    # run migrations then seeds (idempotent)
    entrypoint: ["/bin/sh", "-c", "sqlite3 \"$$DB_PATH\" < /app/migrations/000_init_users.sql || true && node /app/migrate.js || true && npx knex migrate:latest --knexfile /app/knexfile.js || true && npx knex seed:run --knexfile /app/knexfile.js || true"]
    environment:
      - DB_PATH=/data/data.sqlite
      - ADMIN_PASS=adminpass
      - ALEX_PASS=studentpass
      - MARIA_PASS=studentpass2
      - PROF_PASS=profpass
    volumes:
      - tucn_api_data:/data
    networks:
      - tucn-net

volumes:
  tucn_api_data:

networks:
  tucn-net:
    driver: bridge
