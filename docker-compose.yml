services:
  frontend:
    build:
      context: ./tucn-research-opportunities
      dockerfile: Dockerfile
    image: tucn-frontend:latest
    ports:
      - '8080:80'
    depends_on:
      - api
    networks:
      - tucn-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: tucn-api:latest
    environment:
      - DB_PATH=/data/data.sqlite
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env or your shell}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME:-tucn_auth}
      - CSRF_COOKIE_NAME=${CSRF_COOKIE_NAME:-tucn_csrf}
      - CSRF_SECRET=${CSRF_SECRET:-}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - COOKIE_MAX_AGE_MS=${COOKIE_MAX_AGE_MS:-604800000}
      - CSRF_COOKIE_MAX_AGE_MS=${CSRF_COOKIE_MAX_AGE_MS:-7200000}
      - BODY_LIMIT=${BODY_LIMIT:-16mb}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-s3}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-tucn-research-uploads}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-minioadmin123}
      - S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-true}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-5}
    volumes:
      - tucn_api_data:/data
    depends_on:
      - minio
    networks:
      - tucn-net
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - '9001:9001'
    volumes:
      - tucn_minio_data:/data
    networks:
      - tucn-net
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/$${S3_BUCKET};
      /usr/bin/mc anonymous set none local/$${S3_BUCKET};
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - S3_BUCKET=${S3_BUCKET:-tucn-research-uploads}
    networks:
      - tucn-net
  migrations:
    image: tucn-api:latest
    depends_on:
      - api
    # run SQL migration via sqlite3 CLI only (avoid loading node native bindings here)
    entrypoint: ["/bin/sh", "-c", 'DB_PATH=$${DB_PATH:-/data/data.sqlite}; echo "Applying SQL migrations to $$DB_PATH"; sqlite3 "$$DB_PATH" < /app/migrations/000_init_users.sql || true']
    environment:
      - DB_PATH=/data/data.sqlite
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env or your shell}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      - ADMIN_PASS=adminpass
      - ALEX_PASS=studentpass
      - MARIA_PASS=studentpass2
      - PROF_PASS=profpass
    volumes:
      - tucn_api_data:/data
    networks:
      - tucn-net

volumes:
  tucn_api_data:
  tucn_minio_data:

networks:
  tucn-net:
    driver: bridge
